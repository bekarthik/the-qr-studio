# Deploy QR Studio as a static site.
# On Netlify set the site's "base directory" to `qr-studio` (this folder) when
# the repo is a monorepo; these settings then apply relative to it.
[build]
  command = "npm run build"
  publish = "dist"

[build.environment]
  NODE_VERSION = "20"

# Long-cache the hashed assets Vite emits.
[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# History-API router fallback. force=false (default) means a static file that
# actually exists on disk — e.g. a build-time prerendered /wifi/index.html —
# is served as-is; this rule only kicks in for paths with no matching file, so
# the client-side router can render them (or show the 404 route).
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
