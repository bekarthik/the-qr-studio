# Deploy QR Studio as a prebuilt static site.
#
# Netlify no longer BUILDS this site — the prerender step needs Chromium, which
# Netlify's build image lacks, so builds are done in GitHub Actions (which
# installs Chromium) and the prebuilt dist/ is pushed here via the Netlify CLI
# (`netlify deploy --prod --dir=dist`). See docs/runbooks/deploy.md.
#
# There is intentionally NO `[build] command` here. As belt-and-suspenders
# against a stray git-triggered build overwriting the CLI deploy with an
# un-prerendered shell, `ignore` always short-circuits any build Netlify might
# still attempt (a 0 exit tells Netlify "nothing changed, skip"). CLI deploys
# bypass the build pipeline, so they're unaffected. The dashboard toggle
# ("Stop builds") is the primary guard; this is the in-repo backstop.
[build]
  publish = "dist"
  ignore = "exit 0"

# Long-cache the hashed assets Vite emits.
[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# History-API router fallback. force=false (default) means a static file that
# actually exists on disk — e.g. a build-time prerendered /wifi/index.html —
# is served as-is; this rule only kicks in for paths with no matching file, so
# the client-side router can render them (or show the 404 route).
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
