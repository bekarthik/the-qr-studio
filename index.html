<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>QR Studio — image-styled, verified-scannable QR codes</title>
    <meta
      name="description"
      content="Free, in-browser generator for scannable QR codes — links, UPI, Wi-Fi, vCards and more. Style them with your brand colour or your image, and verify they scan before you download. Nothing is uploaded."
    />
    <meta name="theme-color" content="#f4f1ea" />
    <link rel="icon" type="image/svg+xml" href="favicon.svg" />

    <!-- Type: Space Grotesk (display) + Newsreader (editorial accent).
         Loaded non-render-blocking — text paints immediately in the system-font
         fallback (see --font-* in CSS) and swaps in when the webfont arrives, so
         a slow or offline network never blocks or hides content. -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Newsreader:ital,opsz,wght@0,6..72,400;0,6..72,500;1,6..72,500&display=swap"
      media="print"
      onload="this.media='all'"
    />
    <noscript>
      <link
        rel="stylesheet"
        href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Newsreader:ital,opsz,wght@0,6..72,400;0,6..72,500;1,6..72,500&display=swap"
      />
    </noscript>

    <!-- Social cards -->
    <meta property="og:type" content="website" />
    <meta property="og:title" content="QR Studio — QR codes that look like your brand and actually scan" />
    <meta
      property="og:description"
      content="Free, in-browser QR generator. Style codes with your colour or image, verify they scan, export PNG & SVG. Nothing uploaded."
    />
    <meta property="og:image" content="favicon.svg" />
    <meta name="twitter:card" content="summary" />
  </head>
  <body>
    <script>
      // Apply the saved theme before paint to avoid a flash.
      try {
        var t = localStorage.getItem('qrstudio.theme');
        if (t === 'graphite' || t === 'midnight') document.documentElement.dataset.theme = t;
      } catch (e) {}
    </script>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
